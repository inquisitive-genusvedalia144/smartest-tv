[project]
name = "stv"
version = "0.8.0"
description = "Talk to your TV. Control any smart TV with natural language."
readme = "README.md"
license = {text = "FSL-1.1-Apache-2.0"}
requires-python = ">=3.11"
authors = [{ name = "Yunsu Kim" }]
keywords = [
    "tv", "smart-tv", "mcp", "cli", "ai-agent",
    "lg", "samsung", "roku", "android-tv", "fire-tv",
    "deep-link", "netflix", "youtube", "spotify",
]
classifiers = [
    "Development Status :: 3 - Alpha",
    "Intended Audience :: End Users/Desktop",
    "License :: Other/Proprietary License",
    "Programming Language :: Python :: 3",
    "Topic :: Home Automation",
]
dependencies = [
    "click>=8.0.0",
    "tomli>=2.0.0; python_version < '3.11'",
]

[project.optional-dependencies]
lg = ["bscpylgtv>=0.5.0"]
samsung = ["samsungtvws[encrypted]>=3.0.0"]
android = ["adb-shell>=0.4.0"]
roku = ["aiohttp>=3.9.0"]
mcp = ["fastmcp>=2.0.0"]
all = ["stv[lg,samsung,android,roku,mcp]"]
dev = ["pytest>=8.0.0"]

[project.urls]
Homepage = "https://github.com/Hybirdss/smartest-tv"
Repository = "https://github.com/Hybirdss/smartest-tv"

[project.scripts]
stv = "smartest_tv.cli:main"

[tool.pytest.ini_options]
testpaths = ["tests"]
pythonpath = ["src"]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/smartest_tv"]
exclude = ["src/smartest_tv/_engine", "src/smartest_tv/_engine/**"]
